<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Role Management - VIBGYOR HRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(180deg, #4e73df 0%, #224abe 100%);
        }
        .sidebar .nav-link {
            color: rgba(255, 255, 255, 0.8);
            padding: 1rem;
            transition: all 0.3s;
        }
        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            color: white;
            background-color: rgba(255, 255, 255, 0.1);
        }
        .sidebar .nav-link i {
            margin-right: 0.75rem;
        }
        .topbar {
            background-color: white;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
            padding: 1rem 2rem;
        }
        .btn-gradient {
            background: linear-gradient(180deg, #4e73df 0%, #224abe 100%);
            border: none;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.35rem;
            font-weight: 500;
        }
        .btn-gradient:hover {
            background: linear-gradient(180deg, #224abe 0%, #4e73df 100%);
            color: white;
        }
        .status-badge-active {
            background-color: #1cc88a;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.75rem;
        }
        .status-badge-inactive {
            background-color: #e74a3b;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.75rem;
        }
        .search-box {
            position: relative;
            max-width: 300px;
        }
        .search-box input {
            padding-right: 40px;
        }
        .search-box button {
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            border-radius: 0 0.375rem 0.375rem 0;
        }
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1050;
        }
    </style>
</head>
<body>
    <div class="container-fluid p-0">
        <div class="row g-0">
            <!-- Sidebar -->
            <div class="col-auto sidebar">
                <div class="p-4 text-center">
                    <h4 class="text-white mb-0">VIBGYOR HRM</h4>
                    <small class="text-white-50">Role Management</small>
                </div>
                <nav class="nav flex-column">
                    <a class="nav-link" href="/dashboard/">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                    <a class="nav-link" href="/department-management/">
                        <i class="bi bi-building"></i> Departments
                    </a>
                    <a class="nav-link active" href="/role-management/">
                        <i class="bi bi-person-badge"></i> Roles
                    </a>
                    <a class="nav-link" href="/employee-management/">
                        <i class="bi bi-people"></i> Employees
                    </a>
                    <a class="nav-link" href="#">
                        <i class="bi bi-check2-square"></i> Tasks
                    </a>
                    <a class="nav-link" href="#">
                        <i class="bi bi-calendar-check"></i> Leaves
                    </a>
                </nav>
            </div>
            
            <!-- Main Content -->
            <div class="col">
                <div class="topbar d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Role Management</h5>
                    <button class="btn btn-gradient" data-bs-toggle="modal" data-bs-target="#addRoleModal">
                        <i class="bi bi-plus-circle"></i> Create Role
                    </button>
                </div>
                
                <div class="p-4">
                    <!-- Search Box -->
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <div class="search-box">
                                <input type="text" id="searchInput" class="form-control" placeholder="Search by role name or description...">
                                <button class="btn btn-primary" onclick="searchRoles()">
                                    <i class="bi bi-search"></i>
                                </button>
                            </div>
                        </div>
                        <div class="col-md-6 text-end">
                            <div class="btn-group">
                                <button class="btn btn-outline-secondary" onclick="filterRoles('all')">All</button>
                                <button class="btn btn-outline-success" onclick="filterRoles('active')">Active</button>
                                <button class="btn btn-outline-danger" onclick="filterRoles('inactive')">Inactive</button>
                                <button class="btn btn-outline-primary" onclick="loadRoles()">
                                    <i class="bi bi-arrow-repeat"></i> Refresh
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Roles Table -->
                    <div class="card">
                        <div class="card-header bg-white">
                            <h6 class="mb-0">All Roles</h6>
                        </div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-hover">
                                    <thead>
                                        <tr>
                                            <th>ID</th>
                                            <th>Role Name</th>
                                            <th>Description</th>
                                            <th>Users Count</th>
                                            <th>Created Date</th>
                                            <th>Status</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody id="rolesTableBody">
                                        <tr><td colspan="7" class="text-center">Loading roles...</td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Add Role Modal -->
    <div class="modal fade" id="addRoleModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Create New Role</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addRoleForm">
                        <div class="mb-3">
                            <label class="form-label">Role Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="roleName" required placeholder="e.g., Admin, Manager, Team Leader, Employee">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" id="roleDescription" rows="3" placeholder="Describe the responsibilities of this role"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="addRole()">Create Role</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Edit Role Modal -->
    <div class="modal fade" id="editRoleModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit Role</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editRoleForm">
                        <input type="hidden" id="editRoleId">
                        <div class="mb-3">
                            <label class="form-label">Role Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="editRoleName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" id="editRoleDescription" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="updateRole()">Update Role</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Delete Confirmation Modal -->
    <div class="modal fade" id="deleteConfirmModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-warning">
                    <h5 class="modal-title"><i class="bi bi-exclamation-triangle"></i> Warning!</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="deleteModalBody">
                    <p>Are you sure you want to delete this role?</p>
                    <div class="alert alert-danger" id="userWarning" style="display:none;">
                        <i class="bi bi-people-fill"></i> <span id="userCount"></span>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete Role</button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="toast-container"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = '/api';
        let currentFilter = 'all';
        let currentSearchTerm = '';
        let roleToDelete = null;
        
        function showToast(message, type = 'success') {
            const toastContainer = document.querySelector('.toast-container');
            const toastId = 'toast-' + Date.now();
            const bgColor = type === 'success' ? 'bg-success' : (type === 'error' ? 'bg-danger' : 'bg-warning');
            
            const toastHtml = `
                <div id="${toastId}" class="toast align-items-center text-white ${bgColor} border-0 mb-2" role="alert" data-bs-autohide="true" data-bs-delay="3000">
                    <div class="d-flex">
                        <div class="toast-body">${message}</div>
                        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                    </div>
                </div>
            `;
            
            toastContainer.insertAdjacentHTML('beforeend', toastHtml);
            const toastElement = document.getElementById(toastId);
            if (toastElement) {
                const toast = new bootstrap.Toast(toastElement);
                toast.show();
                toastElement.addEventListener('hidden.bs.toast', () => toastElement.remove());
            }
        }
        
        async function loadRoles() {
            try {
                let url = `${API_BASE}/roles/`;
                const params = new URLSearchParams();
                if (currentSearchTerm) params.append('search', currentSearchTerm);
                if (currentFilter !== 'all') params.append('status', currentFilter === 'active' ? 'active' : 'inactive');
                if (params.toString()) url += '?' + params.toString();
                
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const roles = await response.json();
                const tbody = document.getElementById('rolesTableBody');
                
                if (roles.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center">No roles found</td></tr>';
                } else {
                    tbody.innerHTML = roles.map(role => `
                        <tr>
                            <td>${role.role_id}</td>
                            <td><strong>${escapeHtml(role.role_name)}</strong></td>
                            <td>${escapeHtml(role.description) || '-'}</td>
                            <td><span class="badge bg-info">${role.user_count || 0}</span></td>
                            <td>${new Date(role.created_at).toLocaleDateString()}</td>
                            <td>${role.status ? '<span class="status-badge-active">Active</span>' : '<span class="status-badge-inactive">Inactive</span>'}</td>
                            <td>
                                <button class="btn btn-sm btn-warning me-1" onclick="openEditModal(${role.role_id})" title="Edit"><i class="bi bi-pencil"></i></button>
                                <button class="btn btn-sm btn-danger" onclick="confirmDelete(${role.role_id})" title="Delete"><i class="bi bi-trash"></i></button>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Error loading roles: ' + error.message, 'error');
            }
        }
        
        async function addRole() {
            const name = document.getElementById('roleName').value.trim();
            const description = document.getElementById('roleDescription').value.trim();
            
            if (!name) {
                showToast('Please enter role name', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/roles/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ role_name: name, description: description, status: true })
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Server response:', errorText);
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const result = await response.json();
                
                if (response.ok && (result.success === true || result.role_id)) {
                    showToast('Role created successfully!');
                    document.getElementById('addRoleForm').reset();
                    const modal = bootstrap.Modal.getInstance(document.getElementById('addRoleModal'));
                    if (modal) modal.hide();
                    loadRoles();
                    setTimeout(() => { window.location.href = '/dashboard/'; }, 1500);
                } else {
                    let errorMsg = 'Error creating role';
                    if (result.message) errorMsg = result.message;
                    if (result.error) errorMsg = result.error;
                    showToast(errorMsg, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Error creating role: ' + error.message, 'error');
            }
        }
        
        async function openEditModal(id) {
            try {
                const response = await fetch(`${API_BASE}/roles/${id}/`);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const role = await response.json();
                document.getElementById('editRoleId').value = role.role_id;
                document.getElementById('editRoleName').value = role.role_name;
                document.getElementById('editRoleDescription').value = role.description || '';
                
                new bootstrap.Modal(document.getElementById('editRoleModal')).show();
            } catch (error) {
                showToast('Error loading role details: ' + error.message, 'error');
            }
        }
        
        async function updateRole() {
            const id = document.getElementById('editRoleId').value;
            const name = document.getElementById('editRoleName').value.trim();
            const description = document.getElementById('editRoleDescription').value.trim();
            
            if (!name) {
                showToast('Please enter role name', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/roles/${id}/`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ role_name: name, description: description })
                });
                
                const result = await response.json();
                
                if (response.ok && result.success) {
                    showToast(result.message || 'Role updated successfully!');
                    const modal = bootstrap.Modal.getInstance(document.getElementById('editRoleModal'));
                    if (modal) modal.hide();
                    loadRoles();
                    setTimeout(() => { window.location.href = '/dashboard/'; }, 1500);
                } else {
                    showToast(result.message || 'Error updating role', 'error');
                }
            } catch (error) {
                showToast('Error updating role: ' + error.message, 'error');
            }
        }
        
        async function confirmDelete(id) {
            roleToDelete = id;
            try {
                const response = await fetch(`${API_BASE}/roles/${id}/check_users/`);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const data = await response.json();
                const userWarning = document.getElementById('userWarning');
                const userCountSpan = document.getElementById('userCount');
                const confirmBtn = document.getElementById('confirmDeleteBtn');
                
                if (data.user_count > 0) {
                    userWarning.style.display = 'block';
                    userCountSpan.innerHTML = `<strong>Warning:</strong> This role is assigned to ${data.user_count} active user(s). Please reassign them first.`;
                    if (confirmBtn) confirmBtn.disabled = true;
                } else {
                    userWarning.style.display = 'none';
                    if (confirmBtn) confirmBtn.disabled = false;
                }
                
                new bootstrap.Modal(document.getElementById('deleteConfirmModal')).show();
            } catch (error) {
                showToast('Error checking role users: ' + error.message, 'error');
            }
        }
        
        async function deleteRole() {
            if (!roleToDelete) return;
            
            try {
                const response = await fetch(`${API_BASE}/roles/${roleToDelete}/`, {
                    method: 'DELETE',
                    headers: { 'Accept': 'application/json' }
                });
                
                const result = await response.json();
                
                if (response.ok && result.success) {
                    showToast(result.message || 'Role deleted successfully!');
                    const modal = bootstrap.Modal.getInstance(document.getElementById('deleteConfirmModal'));
                    if (modal) modal.hide();
                    loadRoles();
                } else {
                    showToast(result.message || 'Error deleting role', 'error');
                }
            } catch (error) {
                showToast('Error deleting role: ' + error.message, 'error');
            }
        }
        
        function searchRoles() {
            currentSearchTerm = document.getElementById('searchInput').value;
            loadRoles();
        }
        
        function filterRoles(filter) {
            currentFilter = filter;
            loadRoles();
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            const confirmBtn = document.getElementById('confirmDeleteBtn');
            if (confirmBtn) confirmBtn.addEventListener('click', deleteRole);
            
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') searchRoles();
                });
            }
            
            loadRoles();
        });
    </script>
</body>
</html>
